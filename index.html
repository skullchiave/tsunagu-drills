<title>SCG日本語 ドリル</title>
<style>
:root{
  --g1:#dc2626; --g2:#1d4ed8; --g3:#15803d;
  --bg:#eef1f7; --panel:#ffffff; --ink:#16233a; --sub:#5a6b86; --line:#c9d4e6;
  --accent:#e8920c; --accentT:#b45309;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Yu Gothic UI","Yu Gothic","Meiryo",sans-serif;background:var(--bg);color:var(--ink);
  min-height:100dvh;-webkit-text-size-adjust:100%;}
ruby rt{font-size:0.55em;font-weight:500;opacity:.85;}

header{background:#fff;border-bottom:3px solid var(--accent);padding:20px 18px;text-align:center;}
header h1{font-size:clamp(24px,7vw,36px);letter-spacing:.5px;}
header h1 .em{color:var(--accent);}
.qrbtn{margin-top:14px;background:var(--accent);color:#fff;border:none;border-radius:12px;
  padding:12px 24px;font-size:clamp(14px,3.6vw,17px);font-weight:800;font-family:inherit;cursor:pointer;
  box-shadow:0 3px 8px rgba(232,146,12,.35);-webkit-tap-highlight-color:transparent;}
.qrbtn:active{transform:scale(.97);}

main{max-width:720px;margin:0 auto;padding:18px 16px 60px;}

.bar{display:flex;align-items:center;gap:14px;margin-bottom:18px;}
.bar .home{display:inline-flex;align-items:center;gap:6px;background:#fff;border:1.5px solid var(--line);
  border-radius:12px;padding:10px 16px;font-size:clamp(14px,3.8vw,16px);font-weight:800;color:var(--ink);
  text-decoration:none;-webkit-tap-highlight-color:transparent;flex-shrink:0;}
.bar .home:active{transform:scale(.97);}
.bar .bartitle{font-size:clamp(17px,4.6vw,22px);font-weight:800;min-width:0;}

.cats{display:flex;flex-direction:column;gap:16px;margin-top:6px;}
.catbtn{display:flex;align-items:center;gap:16px;background:#fff;border:1px solid var(--line);
  border-left:10px solid var(--accent);border-radius:18px;padding:22px 22px;text-decoration:none;color:inherit;
  box-shadow:0 3px 10px rgba(30,50,90,.07);transition:transform .12s;min-height:96px;
  -webkit-tap-highlight-color:transparent;}
.catbtn:active{transform:scale(.985);}
.catbtn.c-textbook{border-left-color:var(--g1);}
.catbtn.c-drill{border-left-color:var(--g2);}
.catbtn.c-quiz{border-left-color:var(--g3);}
.cattxt{flex:1;min-width:0;}
.catlabel{font-size:clamp(21px,6vw,28px);font-weight:900;line-height:1.3;}
.catsub{font-size:clamp(13px,3.6vw,16px);color:var(--sub);margin-top:6px;line-height:1.5;}
.catgo{color:var(--sub);font-weight:900;font-size:24px;flex-shrink:0;}
.miniready{display:inline-block;font-size:11px;font-weight:800;color:#fff;background:var(--sub);
  border-radius:20px;padding:2px 10px;margin-left:8px;vertical-align:middle;}

.lh{font-size:clamp(15px,4vw,18px);color:var(--accentT);font-weight:900;margin:22px 0 10px;
  padding-bottom:6px;border-bottom:2px solid var(--line);}
.lh:first-child{margin-top:4px;}
.item{display:flex;align-items:center;gap:14px;background:#fff;border:1px solid var(--line);
  border-left:6px solid var(--accent);border-radius:14px;padding:16px 18px;text-decoration:none;color:inherit;
  box-shadow:0 2px 6px rgba(30,50,90,.06);margin-bottom:10px;min-height:64px;
  transition:transform .12s;-webkit-tap-highlight-color:transparent;}
.item:active{transform:scale(.99);}
.item.soon{border-left-color:var(--line);background:#f4f6fb;box-shadow:none;cursor:default;}
.itxt{flex:1;min-width:0;}
.iname{font-size:clamp(17px,4.6vw,20px);font-weight:800;line-height:1.35;}
.item.soon .iname{color:var(--sub);}
.idesc{font-size:13px;color:var(--sub);margin-top:3px;}
.igo{color:var(--accent);font-weight:900;font-size:20px;flex-shrink:0;}
.badge{display:inline-block;font-size:11px;font-weight:800;color:#fff;background:var(--sub);
  border-radius:20px;padding:2px 10px;margin-left:6px;vertical-align:middle;}
.badge.ready{background:var(--g3);}

.soonbox{text-align:center;background:#fff;border:1px dashed var(--line);border-radius:16px;
  padding:40px 20px;color:var(--sub);font-size:clamp(15px,4vw,18px);line-height:1.8;margin-top:6px;}
.soonbox .big{font-size:clamp(20px,5.5vw,26px);font-weight:800;color:var(--ink);margin-bottom:10px;}

footer{text-align:center;color:var(--sub);font-size:12px;padding:24px 16px;line-height:1.8;}

.qrov{position:fixed;inset:0;background:rgba(16,28,48,.85);z-index:1000;display:none;
  align-items:center;justify-content:center;padding:24px;}
.qrov.on{display:flex;}
.qrbox{background:#fff;border-radius:24px;padding:clamp(22px,4vw,40px);text-align:center;
  max-width:min(94vw,560px);box-shadow:0 12px 44px rgba(0,0,0,.45);}
.qrttl{font-size:clamp(18px,4.5vw,26px);font-weight:800;margin-bottom:18px;line-height:1.5;}
.qrsvg{width:min(72vw,62vh,440px);height:auto;display:block;margin:0 auto;}
.qrurl{margin-top:16px;font-size:clamp(11px,3vw,15px);color:var(--sub);word-break:break-all;font-family:monospace;}
.qrclose{margin-top:22px;background:#eef2f8;color:var(--ink);border:1px solid var(--line);border-radius:12px;
  padding:12px 30px;font-size:16px;font-weight:800;font-family:inherit;cursor:pointer;}

@media (max-width:640px){ .qrbtn{display:none;} }
</style>
</head>

const app=document.getElementById('app');

function barHTML(title){
  return '<div class="bar"><a class="home" href="#/">🏠 ホーム</a><span class="bartitle">'+title+'</span></div>';
}
function soonHTML(name){
  return '<div class="soonbox"><div class="big">'+name+'</div>いま じゅんびちゅうです。<br>もうすこし まってください。</div>';
}
function viewHome(){
  let h='<div class="cats">';
  DATA.categories.forEach(function(c){
    h+='<a class="catbtn c-'+c.id+'" href="#/'+c.id+'">'
      +'<div class="cattxt"><div class="catlabel">'+c.label+(c.ready?'':'<span class="miniready">じゅんびちゅう</span>')+'</div>'
      +'<div class="catsub">'+c.sub+'</div></div><div class="catgo">▶</div></a>';
  });
  return h+'</div>';
}
function viewTextbookList(){
  let h=barHTML('<ruby>教科書<rt>きょうかしょ</rt></ruby>');
  DATA.textbooks.forEach(function(t){
    if(t.ready){
      h+='<a class="item" href="#/textbook/'+t.id+'"><span class="itxt"><span class="iname">'+t.label+'</span></span><span class="igo">▶</span></a>';
    }else{
      h+='<div class="item soon"><span class="itxt"><span class="iname">'+t.label+'<span class="badge">じゅんびちゅう</span></span></span></div>';
    }
  });
  return h;
}
function viewTextbook(tbId){
  const tb=DATA.textbooks.find(function(t){return t.id===tbId;});
  if(!tb) return viewHome();
  let h=barHTML(tb.label);
  const ds=DATA.drills.filter(function(d){return d.tb===tbId;});
  const lessons=[];
  ds.forEach(function(d){ if(lessons.indexOf(d.lesson)<0) lessons.push(d.lesson); });
  lessons.forEach(function(L){
    h+='<div class="lh">'+L+'</div>';
    ds.filter(function(d){return d.lesson===L;}).forEach(function(d){
      if(d.ready){
        h+='<a class="item" href="'+d.file+'"><span class="itxt"><span class="iname">'+d.label
          +'</span>'+(d.desc?'<span class="idesc">'+d.desc+'</span>':'')
          +'</span><span class="igo">▶</span></a>';
      }else{
        h+='<div class="item soon"><span class="itxt"><span class="iname">'+d.label
          +'<span class="badge">じゅんびちゅう</span></span></span></div>';
      }
    });
  });
  return h;
}
function render(){
  const parts=location.hash.replace(/^#\/?/,'').split('/').filter(Boolean);
  let html;
  if(parts.length===0){ html=viewHome(); }
  else if(parts[0]==='textbook' && parts.length===1){ html=viewTextbookList(); }
  else if(parts[0]==='textbook'){ html=viewTextbook(parts[1]); }
  else if(parts[0]==='drill'){ html=barHTML('ドリル')+soonHTML('ドリル'); }
  else if(parts[0]==='quiz'){ html=barHTML('<ruby>問題<rt>もんだい</rt></ruby>')+soonHTML('問題'); }
  else { html=viewHome(); }
  app.innerHTML=html;
  window.scrollTo(0,0);
}
window.addEventListener('hashchange',render);
render();
</script>
